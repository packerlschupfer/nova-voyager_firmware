; Nova Voyager Custom Firmware
; PlatformIO Project Configuration
;
; Target: GD32F303RCT6 (256KB Flash, 48KB usable SRAM, Cortex-M4, 72MHz)
; Note: GD32 is largely STM32-compatible, uses STM32F1xx HAL
; Original bootloader at 0x08000000-0x08002FFF (12KB)
; Application starts at 0x08003000 (244KB available)
;
; Build environments:
;   pio run -e release      # Production build (default)
;   pio run -e debug        # Debug build with extra features
;   pio test -e native      # Run unit tests on host

;===========================================================================
; Common settings for all target builds
;===========================================================================
[common]
platform = ststm32
board = genericSTM32F103RC
framework = stm32cube
board_build.ldscript = ldscript.ld
board_build.mcu = stm32f103rct6

lib_deps =
    bojit/PlatformIO-FreeRTOS@^2.1.4

; Common build flags for GD32F303
build_flags_base =
    -D STM32F103xG
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    -D USER_VECT_TAB_ADDRESS
    -D VECT_TAB_BASE_ADDRESS=0x08000000
    -D VECT_TAB_OFFSET=0x3000
    -D GD32F303
    -I include
    -ffunction-sections
    -fdata-sections
    -fstack-usage
    -Wno-unused-variable
    -Wno-unused-function

build_src_filter = +<*> -<main_test.c> -<main_minimal.c> -<gfx_tests.c> -<lcd_graphics_v2.c> -<lcd_spi_graphics.c>

extra_scripts =
    pre:extra_script.py
    post:post_build.py

monitor_port = /dev/ttyNova
monitor_speed = 9600

;===========================================================================
; Release Build (Production)
;===========================================================================
[env:release]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
build_src_filter = ${common.build_src_filter}
extra_scripts = ${common.extra_scripts}
monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}

build_flags =
    ${common.build_flags_base}
    -Os                         ; Optimize for size
    -D NDEBUG                   ; Disable assertions
    -D BUILD_RELEASE=1
    -D LOG_LEVEL=1              ; Minimal logging (errors only)

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

;===========================================================================
; Debug Build (Development)
;===========================================================================
[env:debug]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
build_src_filter = ${common.build_src_filter}
extra_scripts = ${common.extra_scripts}
monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}

build_flags =
    ${common.build_flags_base}
    -Og                         ; Optimize for debugging
    -g3                         ; Maximum debug info
    -D DEBUG=1
    -D BUILD_DEBUG=1
    -D LOG_LEVEL=3              ; Verbose logging (debug, info, warn, error)
    -D STACK_EXTRA=64           ; Extra stack per task for safety
    -D ENABLE_RUNTIME_STATS=1   ; FreeRTOS runtime statistics
    -D ENABLE_STACK_WATERMARK=1 ; Stack high water mark reporting

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

debug_tool = stlink
debug_init_break = tbreak main

;===========================================================================
; 120MHz Release Build (GD32 performance mode, USB DFU disabled)
;===========================================================================
[env:release_120]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
build_src_filter = ${common.build_src_filter}
extra_scripts = ${common.extra_scripts}
monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}

build_flags =
    ${common.build_flags_base}
    -Os
    -D NDEBUG
    -D BUILD_RELEASE=1
    -D USE_120MHZ=1             ; Enable 120MHz mode
    -D LOG_LEVEL=1

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

;===========================================================================
; 120MHz Debug Build (GD32 performance mode, full debugging)
;===========================================================================
[env:debug_120]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
build_src_filter = ${common.build_src_filter}
extra_scripts = ${common.extra_scripts}
monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}

build_flags =
    ${common.build_flags_base}
    -Og
    -g3
    -D DEBUG=1
    -D BUILD_DEBUG=1
    -D USE_120MHZ=1             ; Enable 120MHz mode
    -D LOG_LEVEL=3
    -D STACK_EXTRA=64
    -D ENABLE_RUNTIME_STATS=1
    -D ENABLE_STACK_WATERMARK=1

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

debug_tool = stlink
debug_init_break = tbreak main

;===========================================================================
; Default environment (alias for release @ 120MHz for GD32F303)
;===========================================================================
[env:nova_voyager]
extends = env:release_120

;===========================================================================
; Native Unit Tests (runs on host PC)
;===========================================================================
[env:native]
platform = native
build_flags =
    -I test/mocks
    -I include
    -D NATIVE_TEST=1
    -std=c11
    -g

test_framework = unity
test_build_src = true
build_src_filter = -<*>  ; Don't build src/ for native tests

;===========================================================================
; On-Target Tests (runs on device)
;===========================================================================
[env:target_test]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}

build_flags =
    ${common.build_flags_base}
    -Og
    -g3
    -D DEBUG=1
    -D BUILD_TEST=1
    -D ENABLE_TARGET_TESTS=1

build_src_filter = +<*> -<main_test.c> -<main_minimal.c>

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

;===========================================================================
; Minimal test environment (for hardware bring-up)
;===========================================================================
[env:minimal]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}

build_flags =
    -D STM32F103xG
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    -D USER_VECT_TAB_ADDRESS
    -D VECT_TAB_BASE_ADDRESS=0x08000000
    -D VECT_TAB_OFFSET=0x3000
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -I include

build_src_filter = +<main.c>
upload_protocol = stlink
debug_tool = stlink
;===========================================================================
; MCB Debug - Motor Controller Testing (120MHz, Serial only, EEPROM)
;===========================================================================
[env:mcb_debug]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.ldscript = ${common.board_build.ldscript}
board_build.mcu = ${common.board_build.mcu}
lib_deps = ${common.lib_deps}
extra_scripts = ${common.extra_scripts}
monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}

build_flags =
    ${common.build_flags_base}
    -Og
    -g3
    -D DEBUG=1
    -D BUILD_DEBUG=1
    -D USE_120MHZ=1
    -D MCB_DEBUG_MODE=1          ; Enable MCB debugging features
    -D LOG_LEVEL=3
    -D STACK_EXTRA=64

; Minimal build - just motor UART + serial console + EEPROM
build_src_filter =
    +<main.c>
    +<task_motor.c>
    +<motor.c>
    +<settings.c>
    +<eeprom.c>
    +<commands.c>
    +<init.c>
    +<startup_gd32.s>
    -<*>
    +<shared.c>

upload_protocol = custom
upload_command = openocd -f openocd_gd32.cfg -c "init; halt; program {$SOURCE} 0x08003000 verify; reset run; shutdown"

debug_tool = stlink

