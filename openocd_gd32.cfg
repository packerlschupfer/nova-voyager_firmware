# GD32F303 OpenOCD configuration
# GD32 has different CPUTAPID than STM32F103

# Override CPUTAPID before loading target config
set CPUTAPID 0x2ba01477

# Load standard STM32F1 configuration
source [find interface/stlink.cfg]
transport select hla_swd
source [find target/stm32f1x.cfg]

# GD32 may need connect_under_reset or different reset handling
reset_config none
